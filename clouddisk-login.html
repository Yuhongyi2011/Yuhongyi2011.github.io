<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./img/9042859_pc_check_icon.png">
</head>
<body>
    
    <div class="box">
        <h2>Login</h2>
        <div class="input-box">
            <label>账号</label>
            <input type="text" id="user"/>
        </div>
        <div class="input-box">
            <label>密码</label>
            <input type="password" id="password"/>
        </div>
        <div class="btn-box">
            <a href="#">忘记密码?</a>
            <div>
                <button onclick="login()">登录</button>
                <button onclick="enrollopen()">注册</button>
            </div>
        </div>
    </div>
    <script>
        function enrollopen() {
            alert("目前该功能无法使用")
            
        }
    </script>
    <script src="login.js"></script>
    <script src="enroll.js"></script>
</body>
</html>
